# Dataset v2 for the "Agata" wake word — fixes found during evaluation:
#  - positives include the accepted variants "Agatka" and "Agato"
#  - held-out voice for training is justyna_wg_glos (val-only); mls_6892 is IN
#  - negatives: 115 phrases (hard phonetic neighbours + assistant commands +
#    general speech); validation uses 30 phrases the model never trained on
#  - noise-only negatives are added separately by make_noise_negatives.py
target_phrase: "Agata"
tts_settings:
  models_dir: "/opt/ha/nanowakeword/NwwResourcesModel/tts_train"
  length_scales: [0.8, 0.9, 1.0, 1.1, 1.2]
  noise_scales: [0.4, 0.55, 0.667, 0.8]
  noise_w_scales: [0.6, 0.8, 1.0]

data_generation_tasks:
  - name: "Pozytywne - Agata/Agatka/Agato"
    output_dir: "/opt/ha/nanowakeword/training_data/agata_v2/positive"
    num_samples: 6000
    file_prefix: "pos"
    text_source:
      type: "from_list"
      phrases:
        - "Agata"
        - "Agata"
        - "Agatka"
        - "Agato"

  - name: "Pozytywne walidacyjne (8 glosow, w tym held-out justyna)"
    output_dir: "/opt/ha/nanowakeword/training_data/agata_v2/positive_val"
    num_samples: 400
    file_prefix: "pos_val"
    tts_settings:
      models_dir: "/opt/ha/nanowakeword/NwwResourcesModel/tts_val"
    text_source:
      type: "from_list"
      phrases:
        - "Agata"
        - "Agata"
        - "Agatka"
        - "Agato"

  - name: "Negatywne - trudne fonetycznie + codzienna mowa"
    output_dir: "/opt/ha/nanowakeword/training_data/agata_v2/negative"
    num_samples: 9000
    file_prefix: "neg"

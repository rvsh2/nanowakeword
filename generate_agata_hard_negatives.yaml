# Hard phonetic negatives as a SEPARATE pool: the data sampler picks the
# feature file uniformly, so a dedicated file gives these ~1/3 of all
# negative draws instead of drowning among easy speech.
tts_settings:
  models_dir: "/opt/ha/nanowakeword/NwwResourcesModel/tts_train"
  length_scales: [0.8, 0.9, 1.0, 1.1, 1.2]
  noise_scales: [0.4, 0.55, 0.667, 0.8]
  noise_w_scales: [0.6, 0.8, 1.0]

data_generation_tasks:
  - name: "Twarde negatywy fonetyczne (osobna pula)"
    output_dir: "/opt/ha/nanowakeword/training_data/agata_v2/negative_hard"
    num_samples: 2500
    file_prefix: "hardneg"
    text_source:
      type: "from_list"
      phrases:
        - "agawa"
        - "armata"
        - "chata"
        - "tata"
        - "mata"
        - "wata"
